# Speedarr: one main (dashboard) + three nodes for testing.
# Build once: docker compose build
# Run:       docker compose up -d
# Main UI:   http://localhost:3000  (login with SPEEDARR_PASSWORD or complete first-run)
#
# Add the three nodes on the dashboard (Nodes → Add node):
#   Node 1: Base URL http://speedarr-node1:3000  API key node1-secret  (ID: node1)
#   Node 2: Base URL http://speedarr-node2:3000  API key node2-secret  (ID: node2)
#   Node 3: Base URL http://speedarr-node3:3000  API key node3-secret  (ID: node3)
#
# Speed tests require outbound internet from the container. To verify:
#   docker compose run --rm speedarr-main curl -sI https://www.speedtest.net
#
# Gluetun (VPN) in the dashboard:
#   - Same host as Docker: use http://host.docker.internal:8000 (needs extra_hosts below).
#   - Different host: use that host's URL (e.g. http://192.168.1.36:8000). Ensure Gluetun's control
#     server listens on 0.0.0.0 and the firewall on that host allows the Docker host.

services:
  speedarr-main:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: speedarr:latest
    container_name: speedarr-main
    ports:
      - "3000:3000"
    # So the container can reach services on the Docker host (e.g. Gluetun on same machine)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MODE: complete
      PORT: 3000
      SPEEDARR_DATA_DIR: /config
      # Set a password for testing (or leave unset and use first-run in browser)
      SPEEDARR_PASSWORD: speedarr-test
    volumes:
      - speedarr-main-data:/config
    networks:
      - speedarr

  speedarr-node1:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: speedarr:latest
    container_name: speedarr-node1
    environment:
      MODE: node
      PORT: 3000
      SPEEDARR_DATA_DIR: /config
      SPEEDARR_AGENT_ID: node1
      SPEEDARR_AGENT_NAME: Node 1
      SPEEDARR_API_KEY: node1-secret
    volumes:
      - speedarr-node1-data:/config
    networks:
      - speedarr

  speedarr-node2:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: speedarr:latest
    container_name: speedarr-node2
    environment:
      MODE: node
      PORT: 3000
      SPEEDARR_DATA_DIR: /config
      SPEEDARR_AGENT_ID: node2
      SPEEDARR_AGENT_NAME: Node 2
      SPEEDARR_API_KEY: node2-secret
    volumes:
      - speedarr-node2-data:/config
    networks:
      - speedarr

  speedarr-node3:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: speedarr:latest
    container_name: speedarr-node3
    environment:
      MODE: node
      PORT: 3000
      SPEEDARR_DATA_DIR: /config
      SPEEDARR_AGENT_ID: node3
      SPEEDARR_AGENT_NAME: Node 3
      SPEEDARR_API_KEY: node3-secret
    volumes:
      - speedarr-node3-data:/config
    networks:
      - speedarr

networks:
  speedarr:
    driver: bridge

volumes:
  speedarr-main-data:
  speedarr-node1-data:
  speedarr-node2-data:
  speedarr-node3-data:
